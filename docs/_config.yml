# Just the Docs config
remote_theme: just-the-docs/just-the-docs

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

title: Travel Planning Docs
description: "Personalized Travel Planning System — A modern React dashboard for Kerala tourism."
# Site logo
# logo: "/assets/images/logo.png"

# Color scheme
color_scheme: "light"

# Search settings
search_enabled: true
search:
  heading_level: 2
  previews: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Navigation settings
nav_enabled: true
nav_order: 1

# Footer content
footer_content: 'Personalized Travel Planning System &copy; 2026. Built with <a href="https://just-the-docs.com">Just the Docs</a>.'

# External links in the navigation
# auxiliary_links:
#   "GitHub Repo":
#     - "https://github.com/your-username/your-repo"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Last updated
last_edit_timestamp: true
last_edit_label: "Last updated"
